<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="在线图片分割工具 — 支持自定义行列数、分割线粗细，一键打包下载分割后的图片。" />
    <meta name="theme-color" content="#0f172a" />
    <title>图片分割 | ZeroMarker Tools</title>

    <script>
        try {
            const storedTheme = localStorage.getItem('theme');
            const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
            document.documentElement.dataset.theme = storedTheme || (prefersLight ? 'light' : 'dark');
        } catch {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>

    <link rel="icon" href="https://zeromarker.github.io/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./index.css" />
</head>
<body>
    <!-- 主题切换 -->
    <button class="theme-toggle" type="button" aria-label="切换为浅色主题" title="切换主题">
        <span aria-hidden="true">🌙</span>
    </button>

    <main class="page-shell" style="padding-top:3rem;justify-content:flex-start">
        <!-- 面包屑导航 -->
        <nav style="margin-bottom:1.5rem;font-size:0.92rem">
            <a href="https://zeromarker.github.io/#tools" style="color:var(--accent-hover)">← 返回个人网站</a>
        </nav>

        <header class="hero" style="margin-bottom:2rem">
            <p class="eyebrow">ZeroMarker Tools</p>
            <h1 style="font-size:clamp(1.8rem,5vw,2.8rem)">图片分割</h1>
            <p class="subtitle">将一张图片按行列分割成多张小图，支持自定义分割线粗细，一键打包下载。</p>
        </header>

        <!-- 上传区域 -->
        <section class="split-card" id="uploadZone" aria-label="图片上传">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="10" width="36" height="28" rx="3"/>
                        <circle cx="24" cy="24" r="6"/>
                        <path d="M6 30l10-10 8 8 6-6 12 12"/>
                    </svg>
                </div>
                <p class="upload-text">点击上传或拖拽图片到此处</p>
                <p class="upload-hint">支持 PNG、JPG、WebP</p>
                <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden />
            </div>
        </section>

        <!-- 参数设置 + 预览 -->
        <div class="split-layout is-hidden" id="toolPanel">
            <!-- 左侧：参数设置 -->
            <aside class="split-settings">
                <h2 class="settings-title">分割参数</h2>

                <div class="field-row">
                    <label class="field-label" for="rowsInput">
                        <span>行数</span>
                        <output id="rowsDisplay">3</output>
                    </label>
                    <input type="range" id="rowsInput" min="1" max="20" value="3" class="range-slider" />
                </div>

                <div class="field-row">
                    <label class="field-label" for="colsInput">
                        <span>列数</span>
                        <output id="colsDisplay">3</output>
                    </label>
                    <input type="range" id="colsInput" min="1" max="20" value="3" class="range-slider" />
                </div>

                <div class="field-row">
                    <label class="field-label" for="lineWidthInput">
                        <span>分割线粗细</span>
                        <output id="lineWidthDisplay">2</output><span style="font-size:0.85rem;color:var(--text-muted)"> px</span>
                    </label>
                    <input type="range" id="lineWidthInput" min="0" max="40" value="2" class="range-slider" />
                </div>

                <div class="field-row">
                    <label class="field-label" for="lineColorInput">
                        <span>分割线颜色</span>
                    </label>
                    <div class="color-picker-row">
                        <input type="color" id="lineColorInput" value="#ef4444" class="color-input" />
                        <span id="lineColorText" style="font-size:0.85rem;color:var(--text-muted);font-family:monospace">#ef4444</span>
                    </div>
                </div>

                <div class="field-row">
                    <label class="field-label" for="borderWidthInput">
                        <span>边框线粗细</span>
                        <output id="borderWidthDisplay">0</output><span style="font-size:0.85rem;color:var(--text-muted)"> px</span>
                    </label>
                    <input type="range" id="borderWidthInput" min="0" max="40" value="0" class="range-slider" />
                </div>

                <div class="field-row" style="grid-template-columns:1fr;gap:0.25rem">
                    <label class="field-label">
                        <span>输出格式</span>
                    </label>
                    <div class="format-row">
                        <label class="radio-chip" data-checked>
                            <input type="radio" name="format" value="png" checked />
                            PNG
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="format" value="jpeg" />
                            JPEG
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="format" value="webp" />
                            WebP
                        </label>
                    </div>
                </div>

                <div class="field-row">
                    <span class="field-label"><span>总计分块</span></span>
                    <div class="info-badge" id="totalPieces">3 × 3 = 9 块</div>
                </div>

                <div class="field-row" style="grid-template-columns:1fr">
                    <label class="field-label" for="previewToggle">
                        <span>显示分割线</span>
                    </label>
                    <label class="switch">
                        <input type="checkbox" id="previewToggle" checked />
                        <span class="switch-track"></span>
                    </label>
                </div>

                <button class="download-btn" id="downloadBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载 ZIP 压缩包
                </button>

                <p class="download-hint" id="downloadHint">分割后的图片将打包为 ZIP 下载</p>
            </aside>

            <!-- 右侧：预览 -->
            <div class="split-preview">
                <div class="preview-container" id="previewContainer">
                    <canvas id="previewCanvas"></canvas>
                </div>
                <p class="preview-info" id="previewInfo">加载完成 · 点击下载按钮打包所有分块</p>
            </div>
        </div>

        <!-- 加载状态 -->
        <div class="loading-overlay is-hidden" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <p id="loadingText">正在处理…</p>
        </div>
    </main>

    <footer class="site-footer">
        © 2026 Zeromark
    </footer>

    <!-- JSZip CDN (用于打包 ZIP) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // ── 主题切换 ──
        (function() {
            const toggle = document.querySelector('.theme-toggle');
            const icon = toggle.querySelector('span');
            const root = document.documentElement;
            const themeColor = document.querySelector('meta[name="theme-color"]');

            function sync() {
                const isLight = root.dataset.theme === 'light';
                icon.textContent = isLight ? '☀️' : '🌙';
                toggle.setAttribute('aria-label', isLight ? '切换为深色主题' : '切换为浅色主题');
                themeColor.setAttribute('content', isLight ? '#f6f7fb' : '#101521');
            }

            toggle.addEventListener('click', () => {
                root.dataset.theme = root.dataset.theme === 'light' ? 'dark' : 'light';
                try { localStorage.setItem('theme', root.dataset.theme); } catch {}
                sync();
            });

            sync();
        })();

        // ── 核心逻辑 ──
        (function() {
            'use strict';

            // DOM refs
            const uploadZone = document.getElementById('uploadZone');
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const toolPanel = document.getElementById('toolPanel');
            const previewContainer = document.getElementById('previewContainer');
            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');
            const rowsInput = document.getElementById('rowsInput');
            const colsInput = document.getElementById('colsInput');
            const lineWidthInput = document.getElementById('lineWidthInput');
            const lineColorInput = document.getElementById('lineColorInput');
            const lineColorText = document.getElementById('lineColorText');
            const rowsDisplay = document.getElementById('rowsDisplay');
            const colsDisplay = document.getElementById('colsDisplay');
            const lineWidthDisplay = document.getElementById('lineWidthDisplay');
            const borderWidthInput = document.getElementById('borderWidthInput');
            const borderWidthDisplay = document.getElementById('borderWidthDisplay');
            const totalPieces = document.getElementById('totalPieces');
            const previewToggle = document.getElementById('previewToggle');
            const downloadBtn = document.getElementById('downloadBtn');
            const downloadHint = document.getElementById('downloadHint');
            const previewInfo = document.getElementById('previewInfo');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const formatRadios = document.querySelectorAll('input[name="format"]');

            let sourceImage = null; // HTMLImageElement
            let sourceFile = null;  // original File

            // ── 上传 ──
            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('drag-over');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('drag-over');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) loadImage(file);
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files[0]) loadImage(fileInput.files[0]);
            });

            function loadImage(file) {
                sourceFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        sourceImage = img;
                        uploadZone.classList.add('is-hidden');
                        toolPanel.classList.remove('is-hidden');
                        fitCanvas();
                        drawPreview();
                        downloadBtn.disabled = false;
                        previewInfo.textContent = `加载完成 · ${img.naturalWidth}×${img.naturalHeight} · 点击下载按钮打包所有分块`;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            // ── Canvas 自适应 ──
            function fitCanvas() {
                const container = previewContainer;
                const maxW = container.clientWidth - 4;
                const maxH = container.clientHeight - 4;
                const imgW = sourceImage.naturalWidth;
                const imgH = sourceImage.naturalHeight;
                const scale = Math.min(maxW / imgW, maxH / imgH, 1);
                canvas.width = Math.round(imgW * scale);
                canvas.height = Math.round(imgH * scale);
                canvas.style.width = canvas.width + 'px';
                canvas.style.height = canvas.height + 'px';
            }

            function getSplitLayout(rows, cols, lineW, borderWidth) {
                const imgW = sourceImage.naturalWidth;
                const imgH = sourceImage.naturalHeight;
                const totalW = imgW - borderWidth * 2;
                const totalH = imgH - borderWidth * 2;
                const cellW = Math.floor((totalW - (lineW * (cols - 1))) / cols);
                const cellH = Math.floor((totalH - (lineW * (rows - 1))) / rows);
                const usedW = cols * cellW + (cols - 1) * lineW;
                const usedH = rows * cellH + (rows - 1) * lineW;

                return {
                    imgW,
                    imgH,
                    totalW,
                    totalH,
                    cellW,
                    cellH,
                    usedW,
                    usedH,
                    isValid: cellW >= 1 && cellH >= 1,
                };
            }

            // ── 绘制预览 ──
            function drawPreview() {
                if (!sourceImage) return;
                const cw = canvas.width;
                const ch = canvas.height;
                const rows = parseInt(rowsInput.value);
                const cols = parseInt(colsInput.value);
                const lineW = parseInt(lineWidthInput.value);
                const color = lineColorInput.value;
                const showGrid = previewToggle.checked;
                const borderWidth = parseInt(borderWidthInput.value);

                ctx.clearRect(0, 0, cw, ch);
                ctx.drawImage(sourceImage, 0, 0, cw, ch);

                if (showGrid && rows > 0 && cols > 0) {
                    const layout = getSplitLayout(rows, cols, lineW, borderWidth);

                    if (!layout.isValid) {
                        updateStats();
                        return;
                    }

                    const scale = cw / layout.imgW;
                    const toCanvas = value => Math.round(value * scale);
                    const fillSourceRect = (x, y, width, height) => {
                        const left = toCanvas(x);
                        const top = toCanvas(y);
                        const right = toCanvas(x + width);
                        const bottom = toCanvas(y + height);
                        ctx.fillRect(left, top, Math.max(1, right - left), Math.max(1, bottom - top));
                    };
                    ctx.fillStyle = color;

                    if (borderWidth > 0) {
                        fillSourceRect(0, 0, layout.imgW, borderWidth);
                        fillSourceRect(0, layout.imgH - borderWidth, layout.imgW, borderWidth);
                        fillSourceRect(0, 0, borderWidth, layout.imgH);
                        fillSourceRect(layout.imgW - borderWidth, 0, borderWidth, layout.imgH);
                    }

                    if (lineW > 0) {
                        for (let c = 1; c < cols; c++) {
                            const x = borderWidth + c * layout.cellW + (c - 1) * lineW;
                            fillSourceRect(x, borderWidth, lineW, layout.totalH);
                        }

                        for (let r = 1; r < rows; r++) {
                            const y = borderWidth + r * layout.cellH + (r - 1) * lineW;
                            fillSourceRect(borderWidth, y, layout.totalW, lineW);
                        }
                    }

                    const unusedRight = layout.totalW - layout.usedW;
                    const unusedBottom = layout.totalH - layout.usedH;

                    if (unusedRight > 0) {
                        fillSourceRect(borderWidth + layout.usedW, borderWidth, unusedRight, layout.totalH);
                    }

                    if (unusedBottom > 0) {
                        fillSourceRect(borderWidth, borderWidth + layout.usedH, layout.totalW, unusedBottom);
                    }
                }

                updateStats();
            }

            // ── 更新统计 ──
            function updateStats() {
                const rows = parseInt(rowsInput.value);
                const cols = parseInt(colsInput.value);
                totalPieces.textContent = `${rows} × ${cols} = ${rows * cols} 块`;
            }

            // ── 参数事件 ──
            rowsInput.addEventListener('input', () => {
                rowsDisplay.textContent = rowsInput.value;
                drawPreview();
            });
            colsInput.addEventListener('input', () => {
                colsDisplay.textContent = colsInput.value;
                drawPreview();
            });
            lineWidthInput.addEventListener('input', () => {
                lineWidthDisplay.textContent = lineWidthInput.value;
                drawPreview();
            });
            borderWidthInput.addEventListener('input', () => {
                borderWidthDisplay.textContent = borderWidthInput.value;
                drawPreview();
            });
            lineColorInput.addEventListener('input', () => {
                lineColorText.textContent = lineColorInput.value;
                drawPreview();
            });
            previewToggle.addEventListener('change', drawPreview);

            // 输出格式切换
            formatRadios.forEach(r => {
                r.addEventListener('change', () => {
                    document.querySelectorAll('.radio-chip').forEach(chip => {
                        chip.dataset.checked = chip.querySelector('input').checked ? '' : undefined;
                    });
                });
            });

            // 窗口尺寸变化重新适配
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (sourceImage) { fitCanvas(); drawPreview(); }
                }, 200);
            });

            // ── 分割并下载 ──
            downloadBtn.addEventListener('click', async () => {
                if (!sourceImage) return;

                const rows = parseInt(rowsInput.value);
                const cols = parseInt(colsInput.value);
                const lineW = parseInt(lineWidthInput.value);
                const borderWidth = parseInt(borderWidthInput.value);
                const format = document.querySelector('input[name="format"]:checked').value;
                const ext = format === 'jpeg' ? 'jpg' : format;

                // 每块尺寸（去掉分割线间隙和边框）
                const layout = getSplitLayout(rows, cols, lineW, borderWidth);

                if (!layout.isValid) {
                    previewInfo.textContent = '⚠️ 分割线或边框过粗，请减小参数';
                    return;
                }

                if (typeof JSZip === 'undefined') {
                    previewInfo.textContent = '❌ JSZip 库加载失败，请刷新页面重试';
                    return;
                }

                showLoading('正在分割图片…');

                try {
                    const zip = new JSZip();
                    const total = rows * cols;
                    const mimeType = format === 'jpeg' ? 'image/jpeg' : format === 'webp' ? 'image/webp' : 'image/png';

                    // 计算文件名填充位数
                    const padLen = String(total).length;

                    const offscreen = document.createElement('canvas');
                    const offCtx = offscreen.getContext('2d');

                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            const sx = borderWidth + Math.round(c * (layout.cellW + lineW));
                            const sy = borderWidth + Math.round(r * (layout.cellH + lineW));

                            offscreen.width = layout.cellW;
                            offscreen.height = layout.cellH;
                            offCtx.clearRect(0, 0, layout.cellW, layout.cellH);
                            offCtx.drawImage(sourceImage, sx, sy, layout.cellW, layout.cellH, 0, 0, layout.cellW, layout.cellH);

                            const blob = await new Promise(resolve => {
                                offscreen.toBlob(b => resolve(b), mimeType, 0.92);
                            });

                            const idx = r * cols + c + 1;
                            const name = `split_${String(idx).padStart(padLen, '0')}.${ext}`;
                            zip.file(name, blob);
                        }
                    }

                    showLoading('正在打包 ZIP…');

                    const zipBlob = await zip.generateAsync({ type: 'blob' });
                    const originalName = sourceFile ? sourceFile.name.replace(/\.[^.]+$/, '') : 'image';
                    // 原生下载（无需 FileSaver.js）
                    const url = URL.createObjectURL(zipBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${originalName}_split.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 10000);

                    hideLoading();
                    previewInfo.textContent = `✅ 下载完成！共 ${total} 块图片已打包为 ZIP`;
                } catch (err) {
                    hideLoading();
                    previewInfo.textContent = '❌ 出错了: ' + err.message;
                    console.error(err);
                }
            });

            // ── 加载指示器 ──
            function showLoading(text) {
                loadingText.textContent = text || '正在处理…';
                loadingOverlay.classList.remove('is-hidden');
                downloadBtn.disabled = true;
            }

            function hideLoading() {
                loadingOverlay.classList.add('is-hidden');
                downloadBtn.disabled = false;
            }

            // ── 重新上传 ──
            // 允许点击图片区域重新上传
            previewContainer.addEventListener('dblclick', () => {
                if (confirm('重新选择图片？当前分割参数将保留。')) {
                    fileInput.value = '';
                    fileInput.click();
                }
            });

            // ── 键盘快捷键 ──
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !downloadBtn.disabled && !toolPanel.classList.contains('is-hidden')) {
                    downloadBtn.click();
                }
            });
        })();
    </script>

    <style>
        /* ===== 工具页面专属样式 ===== */

        /* ── 上传区域 ── */
        .split-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 42px var(--shadow);
            overflow: hidden;
        }

        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 4rem 2rem;
            cursor: pointer;
            transition: background 180ms ease, border-color 180ms ease;
            border: 2px dashed var(--border);
            border-radius: 12px;
            background: color-mix(in srgb, var(--accent) 3%, transparent);
            min-height: 260px;
        }

        .upload-area:hover {
            background: color-mix(in srgb, var(--accent) 8%, transparent);
            border-color: var(--accent);
        }

        .upload-area.drag-over {
            background: color-mix(in srgb, var(--accent) 14%, transparent);
            border-color: var(--accent-hover);
            border-style: solid;
        }

        .upload-icon {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .upload-area:hover .upload-icon {
            color: var(--accent);
            opacity: 0.8;
        }

        .upload-text {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .upload-hint {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ── 双栏布局 ── */
        .split-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.25rem;
            align-items: start;
        }

        .split-layout.is-hidden {
            display: none;
        }

        @media (max-width: 820px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ── 左侧设置面板 ── */
        .split-settings {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 42px var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .settings-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.5rem;
            align-items: center;
        }

        .field-label {
            font-size: 0.92rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            white-space: nowrap;
        }

        .field-label output {
            font-weight: 700;
            color: var(--accent);
            min-width: 2ch;
            text-align: right;
        }

        /* ── 范围滑块 ── */
        .range-slider {
            grid-column: 1 / -1;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: color-mix(in srgb, var(--accent) 25%, var(--border));
            outline: none;
            transition: background 180ms ease;
            cursor: pointer;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 120ms ease;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .range-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* ── 颜色选择器 ── */
        .color-picker-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            grid-column: 1 / -1;
        }

        .color-input {
            -webkit-appearance: none;
            appearance: none;
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }

        .color-input::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-input::-webkit-color-swatch {
            border: none;
            border-radius: 5px;
        }

        .color-input::-moz-color-swatch {
            border: none;
            border-radius: 5px;
        }

        /* ── 输出格式单选 ── */
        .format-row {
            display: flex;
            gap: 0.5rem;
            grid-column: 1 / -1;
        }

        .radio-chip {
            flex: 1;
            text-align: center;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 150ms ease;
            background: transparent;
            color: var(--text-muted);
        }

        .radio-chip input {
            display: none;
        }

        .radio-chip[data-checked] {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 15%, transparent);
            color: var(--accent);
        }

        .radio-chip:hover {
            border-color: var(--accent-hover);
        }

        /* ── 开关 ── */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
            cursor: pointer;
            justify-self: end;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-track {
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: color-mix(in srgb, var(--accent) 20%, var(--border));
            transition: background 180ms ease;
        }

        .switch-track::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text);
            transition: transform 180ms ease, background 180ms ease;
        }

        .switch input:checked + .switch-track {
            background: var(--accent);
        }

        .switch input:checked + .switch-track::after {
            transform: translateX(18px);
            background: white;
        }

        /* ── 信息徽章 ── */
        .info-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            background: color-mix(in srgb, var(--accent) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
        }

        /* ── 下载按钮 ── */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.85rem 1.25rem;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 180ms ease;
            box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 40%, transparent);
        }

        .download-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px color-mix(in srgb, var(--accent) 50%, transparent);
        }

        .download-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .download-btn:focus-visible {
            outline: 3px solid color-mix(in srgb, var(--accent) 68%, white);
            outline-offset: 4px;
        }

        .download-hint {
            margin: -0.5rem 0 0;
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* ── 右侧预览 ── */
        .split-preview {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 42px var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-container {
            flex: 1;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 1rem;
            background:
                repeating-conic-gradient(var(--bg-soft) 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
        }

        .preview-container canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .preview-info {
            margin: 0;
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            text-align: center;
            border-top: 1px solid var(--border);
        }

        /* ── 加载遮罩 ── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: color-mix(in srgb, var(--bg) 85%, transparent);
            backdrop-filter: blur(8px);
        }

        .loading-overlay.is-hidden {
            display: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay p {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }
    </style>
</body>
</html>
